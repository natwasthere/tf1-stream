name: Run Script Every 6 Hours FR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create folders
        run: |
          mkdir -p fr
          mkdir -p txt

      - name: Install Streamlink
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install streamlink

      - name: Generate TF1 Stream
        run: |
          curl_output=$(curl -k -s -H "User-Agent: Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.6533.103 Mobile Safari/537.36" https://callofliberty.fr/tv/1-TF1/1-TF1.php | grep -oP "source:\s*'\K[^']+(?=',)")
          curl_output2=$(curl -k -e "https://callofliberty.fr/" -A "Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.6533.103 Mobile Safari/537.36" -H "Origin: https://callofliberty.fr" "$curl_output")

          echo "$curl_output2" > fr/videotf1.m3u8

          best_url=$(awk '
            /^#EXT-X-STREAM-INF:/ {
              bw = 0
              if (match($0, /BANDWIDTH=[0-9]+/)) {
                bw = substr($0, RSTART + 10, RLENGTH - 10) + 0
              }
              if (getline url > 0) {
                if (bw > max_bw) {
                  max_bw = bw
                  best_url = url
                }
              }
            }
            END {
              print best_url
            }
          ' fr/videotf1.m3u8)

          {
            echo "#EXTM3U"
            echo "#EXTINF:-1,TF1"
            echo "$best_url"
          } > fr/videotf1.m3u8

          mv -f fr/videotf1.m3u8 fr/videotf1.m3u

          echo "Final TF1 file:"
          cat fr/videotf1.m3u

      - name: Generate CNEWS Stream
        run: |
          echo "Available CNEWS streams:"
          timeout 60 streamlink "https://www.dailymotion.com/video/x3b68jn" > txt/cnews_streams.txt 2>&1 || true
          cat txt/cnews_streams.txt

          stream_name=$(grep -oE '[0-9]{3,4}p([0-9]{2})?' txt/cnews_streams.txt | sort -V | tail -n 1)

          if [ -z "$stream_name" ]; then
            echo "No explicit resolution stream name found, falling back to best-unfiltered"
            stream_name="best-unfiltered"
          fi

          echo "Chosen stream: $stream_name"

          m3u8_url=$(timeout 60 streamlink --stream-url "https://www.dailymotion.com/video/x3b68jn" "$stream_name")

          if [ -z "$m3u8_url" ]; then
            echo "No stream URL found with Streamlink"
            exit 1
          fi

          {
            echo "#EXTM3U"
            echo "#EXTINF:-1,CNEWS"
            echo "$m3u8_url"
          } > fr/videocnews.m3u

          echo "Final CNEWS file:"
          cat fr/videocnews.m3u

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add fr/videotf1.m3u
          git add fr/videocnews.m3u

          git commit -m "Update TF1 and CNEWS streams" || echo "No changes"
          git push
