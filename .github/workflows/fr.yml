name: Run Script Every 6 Hours FR

on:
  schedule:
    - cron: '0 */3 * * *'  # Run every 3 hours
  workflow_dispatch:      # Enable manual triggering

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Create fr Folder
        run: mkdir -p fr

      - name: Create txt Folder
        run: mkdir -p txt        

      - name: Run Script and Generate Best Quality M3U for VideoTF1
        run: |
          curl_output=$(curl -k -s -H "User-Agent: Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.6533.103 Mobile Safari/537.36" https://callofliberty.fr/tv/1-TF1/1-TF1.php | grep -oP "source:\s*'\K[^']+(?=',)")
          curl_output2=$(curl -k -e "https://callofliberty.fr/" -A "Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.6533.103 Mobile Safari/537.36" -H "Origin: https://callofliberty.fr" "$curl_output")

          # Save original master playlist first
          echo "$curl_output2" > fr/videotf1.m3u8

          # Extract the URL of the highest BANDWIDTH variant
          best_url=$(awk '
            /^#EXT-X-STREAM-INF:/ {
              bw = 0
              if (match($0, /BANDWIDTH=[0-9]+/)) {
                bw = substr($0, RSTART + 10, RLENGTH - 10) + 0
              }
              if (getline url > 0) {
                if (bw > max_bw) {
                  max_bw = bw
                  best_url = url
                }
              }
            }
            END {
              print best_url
            }
          ' fr/videotf1.m3u8)

          # Replace file content with only the best stream
          {
            echo "#EXTM3U"
            echo "#EXTINF:-1,TF1"
            echo "$best_url"
          } > fr/videotf1.m3u8

          # Rename to .m3u
          mv -f fr/videotf1.m3u8 fr/videotf1.m3u

          echo "Final file content:"
          cat fr/videotf1.m3u

      - name: Commit and push generated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fr/videotf1.m3u
          git commit -m "Update videotf1.m3u" || echo "No changes to commit"
          git push
